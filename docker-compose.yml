# 家庭书籍管理系统 - Docker Compose 配置
# 用于NAS部署

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family-books-backend
    ports:
      - "5201:5201"
    environment:
      - DB_HOST=${DB_HOST:-192.168.1.108}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-chenwei}
      - DB_PASSWORD=${DB_PASSWORD:-761211}
      - DB_NAME=${DB_NAME:-family_books}
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - family-books-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5201/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-books-frontend
    ports:
      - "5101:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - family-books-network

networks:
  family-books-network:
    driver: bridge